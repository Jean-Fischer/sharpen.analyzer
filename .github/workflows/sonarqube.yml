name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: windows-latest # Required for dotnet-sonarscanner

    steps:
      # Setup .NET (required for build)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Setup Java (required for SonarQube)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarQube analysis

      # Install SonarQube scanner
      - name: Install SonarQube scanner
        shell: powershell
        run: dotnet tool install --global dotnet-sonarscanner

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore "Sharpen.Analyzer/Sharpen.Analyzer.sln"

      # Begin SonarQube analysis
      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          dotnet sonarscanner begin /k:"Jean-Fischer_sharpen.analyzer" /o:"jean-fischer" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.cs.opencover.reportsPaths="Sharpen.Analyzer/TestResults/Coverage/coverage.opencover.xml"

      # Build project
      - name: Build
        run: dotnet build "Sharpen.Analyzer/Sharpen.Analyzer.sln" --configuration Release --no-restore

      # Install Coverlet (required for coverage report generation)
      - name: Install Coverlet
        shell: powershell
        run: dotnet tool install --global coverlet.console

      # Run tests with coverage (Coverlet console -> OpenCover)
      - name: Run tests for coverage
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "Sharpen.Analyzer/TestResults/Coverage" | Out-Null

          # Build the test project so the test assembly exists for coverlet
          dotnet build "Sharpen.Analyzer/Sharpen.Analyzer/Sharpen.Analyzer.Tests/Sharpen.Analyzer.Tests.csproj" --configuration Release --no-restore

          # Generate OpenCover report for SonarQube
          $testDll = "Sharpen.Analyzer/Sharpen.Analyzer/Sharpen.Analyzer.Tests/bin/Release/net10.0/Sharpen.Analyzer.Tests.dll"
          $testArgs = @(
            'test'
            'Sharpen.Analyzer/Sharpen.Analyzer.Tests/Sharpen.Analyzer.Tests.csproj'
            '--configuration'
            'Release'
            '--no-build'
          )

          Push-Location "Sharpen.Analyzer"
          try {
            coverlet "../$testDll" --target "dotnet" --targetargs ($testArgs -join ' ') -f opencover -o "TestResults/Coverage/coverage.opencover.xml"
          }
          finally {
            Pop-Location
          }

      # End SonarQube analysis
      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"