name: SonarQube Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: windows-latest # Required for dotnet-sonarscanner

    steps:
      # Setup .NET (required for build)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Setup Java (required for SonarQube)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarQube analysis

      # Install SonarQube scanner
      - name: Install SonarQube scanner
        shell: powershell
        run: dotnet tool install --global dotnet-sonarscanner

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore "Sharpen.Analyzer/Sharpen.Analyzer.sln"

      # Begin SonarQube analysis
      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          dotnet sonarscanner begin /k:"Jean-Fischer_sharpen.analyzer" /o:"jean-fischer" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.cs.opencover.reportsPaths="Sharpen.Analyzer/TestResults/Coverage/coverage.opencover.xml"

      # Build project
      - name: Build
        run: dotnet build "Sharpen.Analyzer/Sharpen.Analyzer.sln" --configuration Release --no-restore

      # Run tests with coverage (Coverlet collector -> OpenCover)
      - name: Run tests with coverage
        shell: cmd
        run: |
          if not exist "Sharpen.Analyzer\TestResults\Coverage" mkdir "Sharpen.Analyzer\TestResults\Coverage"
          dotnet test "Sharpen.Analyzer\Sharpen.Analyzer.sln" --configuration Release --no-restore --collect:"XPlat Code Coverage" --settings "Sharpen.Analyzer\coverlet.runsettings"
          for /r "Sharpen.Analyzer" %%F in (coverage.opencover.xml) do (
            copy /y "%%F" "Sharpen.Analyzer\TestResults\Coverage\coverage.opencover.xml" >nul
            goto :copied
          )
          echo ERROR: coverage.opencover.xml not found
          exit /b 1
          :copied
          echo Coverage report: Sharpen.Analyzer\TestResults\Coverage\coverage.opencover.xml

      # End SonarQube analysis
      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"